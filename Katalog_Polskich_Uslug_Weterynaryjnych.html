<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edina - Katalog Polskich Usług Weterynaryjnych</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#00B4AE;--dark:#007E7A;--light:#E0F7F5;--lighter:#F4FDFB;
  --bg:#F4F7F8;--white:#fff;--text:#1a2332;--text-light:#5a6a7a;
  --border:#DDE3E9;--radius:12px;--radius-sm:7px;--danger:#DC2626;
  --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-md:0 4px 24px rgba(0,0,0,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ──────────────────────────────────────────────── */
.header{background:var(--white);border-bottom:2.5px solid var(--primary);padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md)}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:16px;height:58px}
.logo-wrap{display:flex;align-items:center;gap:14px}
.logo-divider{width:1px;height:28px;background:var(--border)}
.logo-wordmark{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:800;color:var(--dark);letter-spacing:-1px;line-height:1}
.logo-subtitle{font-size:11.5px;font-weight:600;color:var(--text-light);letter-spacing:.1px;line-height:1.4}
.stats{font-size:11px;color:var(--text-light);display:flex;gap:4px;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 14px}
.stats b{color:var(--dark);font-weight:700}
.stats .sep{color:var(--border);font-size:14px;margin:0 3px}

/* ── LAYOUT ──────────────────────────────────────────────── */
.layout{display:flex;height:calc(100vh - 61px)}
.left{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.right{width:504px;flex-shrink:0;background:var(--white);border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:-4px 0 16px rgba(0,0,0,.04)}

/* ── TOOLBAR ─────────────────────────────────────────────── */
.toolbar{background:var(--white);border-bottom:1.5px solid var(--border);padding:12px 18px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.search-wrap{position:relative;flex:1;min-width:220px}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.35;font-size:14px;pointer-events:none}
.s-input{width:100%;padding:8px 32px 8px 32px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--bg)}
.s-input:focus{border-color:var(--primary);background:var(--white)}
.s-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:14px;color:#94a3b8;cursor:pointer;display:none}
.s-clear.vis{display:block}
.filter-group{display:flex;flex-direction:column;gap:3px}
.filter-group label{font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.7px}
select.f-sel{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;background:var(--bg);cursor:pointer;outline:none;min-width:180px;transition:border-color .15s}
select.f-sel:focus{border-color:var(--primary);background:var(--white)}
select.f-sel.has{border-color:var(--primary);background:var(--light);color:var(--dark);font-weight:700}
.reset-btn{padding:7px 14px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);font-size:11px;font-family:inherit;background:none;color:var(--text-light);cursor:pointer;align-self:flex-end;transition:all .15s}
.reset-btn:hover{border-color:var(--danger);color:var(--danger)}

.results-bar{padding:5px 18px;font-size:11.5px;color:var(--text-light);background:var(--lighter);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sel-all-btn{padding:3px 10px;border:1.5px solid var(--border);border-radius:20px;font-size:11px;font-family:inherit;background:var(--white);cursor:pointer;color:var(--text-light);transition:all .15s}
.sel-all-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ── TABELA ──────────────────────────────────────────────── */
.tbl-wrap{flex:1;overflow:auto;padding:0}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;font-family:inherit}
th{background:var(--dark);color:white;padding:8px 11px;text-align:left;font-weight:700;font-size:10px;letter-spacing:.6px;white-space:nowrap;position:sticky;top:0;z-index:5;cursor:pointer;user-select:none;font-family:inherit}
th:hover{background:#006B67}
th.sort-asc::after{content:" ↑"}th.sort-desc::after{content:" ↓"}
td{padding:7px 11px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}
tr:has(span.nazwa-cell:hover) td{background:var(--lighter)}
tr.selected td{background:var(--light)!important}
tr:hover td{background:#F9FDFC}
tr.selected:hover td{background:var(--light)!important}
th:first-child,td:first-child{width:32px;text-align:center}
td input[type=checkbox]{accent-color:var(--primary);cursor:pointer;width:14px;height:14px}
.kat-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.kat-ANESTEZJOLOGIA{background:#E0F2F1;color:#00695C}
.kat-DIAGNOSTYKA{background:#DBEAFE;color:#1D4ED8}
.kat-FIZJOTERAPIA{background:#FEF3C7;color:#92400E}
.kat-PROFILAKTYKA{background:#D1FAE5;color:#059669}
.kat-AMBULATORYJNE{background:#E0F7F5;color:#007E7A}
.kat-POLOZNICTWO{background:#FCE7F3;color:#9D174D}
.kat-ZABIEGI{background:#DCFCE7;color:#166534}
.kat-DOKUMENTACJA{background:#F3F4F6;color:#374151}
.kat-SZPITAL{background:#FEE2E2;color:#991B1B}
.empty-state{text-align:center;padding:56px 16px;color:var(--text-light)}

/* ── TOOLTIP ─────────────────────────────────────────────── */
.nazwa-cell{position:relative;cursor:help;display:inline-block}
.nazwa-cell:hover{outline:1.5px dashed var(--primary);border-radius:3px}
.nazwa-cell .tip{
  display:none;position:absolute;left:100%;top:1.4em;margin-left:8px;z-index:200;
  background:#fff;border:1.5px solid var(--primary);border-radius:8px;
  padding:10px 14px;min-width:170px;white-space:nowrap;
  font-size:12px;line-height:1.8;color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,.12);pointer-events:none;
}
.nazwa-cell:hover .tip{display:block}
.tip-arrow{font-size:13px;display:block;text-align:center;color:var(--primary)}
.tip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light)}

/* ── PRAWA KOLUMNA ───────────────────────────────────────── */
.right-section{padding:14px 16px;border-bottom:1.5px solid var(--border)}
.right-section:last-child{border-bottom:none;flex:1;overflow:hidden;display:flex;flex-direction:column}
.section-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-light);margin-bottom:10px}

/* ── PODGLĄD AKTYWNEGO ───────────────────────────────────── */
.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.preview-count{background:var(--primary);color:white;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
.preview-items{max-height:200px;overflow-y:auto;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);padding:6px 8px;font-size:11.5px;flex-shrink:0}
.preview-empty{color:var(--text-light);font-style:italic;padding:6px 2px}
.preview-line{display:flex;align-items:baseline;gap:4px;padding:3px 2px;border-bottom:1px solid var(--border)}
.preview-line:last-child{border-bottom:none}
.pl-num{color:var(--text-light);min-width:18px;font-size:10px;flex-shrink:0}
.pl-txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-rm{background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:11px;padding:0 2px;flex-shrink:0;transition:color .1s}
.pl-rm:hover{color:var(--danger)}

/* ── SUMA ────────────────────────────────────────────────── */
.preview-sum{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:9px 12px;background:var(--light);border:2px solid var(--primary);border-radius:var(--radius-sm)}
.preview-sum-label{font-size:10px;font-weight:700;color:var(--dark);text-transform:uppercase;letter-spacing:.7px}
.preview-sum-value{font-size:15px;font-weight:800;color:var(--dark)}

/* ── ZAPIS ───────────────────────────────────────────────── */
.save-row{display:flex;gap:6px;margin-top:10px}
.set-name-input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-weight:600;font-family:inherit;outline:none;transition:border-color .15s;background:var(--bg)}
.set-name-input:focus{border-color:var(--primary);background:var(--white)}
.btn{padding:7px 12px;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-save{background:var(--primary);color:white}.btn-save:hover{background:var(--dark)}
.btn-clear{background:var(--danger);color:white;font-size:11px;padding:7px 10px}.btn-clear:hover{background:#B91C1C}

/* ── LISTA ZESTAWÓW ──────────────────────────────────────── */
.set-list-wrap{flex:1;overflow-y:auto;padding-top:4px}
.no-sets{color:var(--text-light);font-size:12px;font-style:italic;padding:10px 2px}
.set-row{display:flex;align-items:center;gap:6px;padding:6px 4px;border-bottom:1px solid var(--border);font-size:12px}
.set-row:last-child{border-bottom:none}
.set-row.set-active .set-row-name{color:var(--dark);font-weight:700}
.set-row-name-wrap{position:relative;flex:1;min-width:0;cursor:help}
.set-row-name{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-block;max-width:100%}
.set-row-name-wrap:hover .set-row-name{color:var(--primary)}
.set-row-tip{display:none;position:absolute;left:100%;top:1.4em;margin-left:8px;z-index:200;
  background:var(--white);border:1.5px solid var(--primary);border-radius:8px;
  padding:10px 14px;min-width:160px;max-width:240px;white-space:normal;
  font-size:11px;line-height:1.8;color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,.12);pointer-events:none;}
.set-row-name-wrap:hover .set-row-tip{display:block}
.set-row-val{font-weight:700;color:var(--dark);white-space:nowrap;font-size:12px;min-width:58px;text-align:right}
.sca-load{padding:3px 9px;border:1.5px solid var(--primary);border-radius:20px;background:var(--white);color:var(--primary);font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s}
.sca-load:hover{background:var(--primary);color:white}
.sca-dl,.sca-del{padding:3px 7px;border:1.5px solid var(--border);border-radius:20px;background:var(--white);font-size:11px;font-family:inherit;cursor:pointer;color:var(--text-light);transition:all .15s}
.sca-dl:hover{color:var(--primary);border-color:var(--primary)}
.sca-del:hover{color:var(--danger);border-color:var(--danger)}

.toast{position:fixed;bottom:24px;right:28px;background:var(--text);color:white;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;z-index:9999;opacity:0;transform:translateY(10px);transition:opacity .25s,transform .25s;pointer-events:none;box-shadow:var(--shadow-md)}
.toast.show{opacity:1;transform:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="logo-wrap">
      <div class="logo-wordmark">edina</div>
      <div class="logo-divider"></div>
      <div class="logo-subtitle">Katalog Polskich Usług Weterynaryjnych<br>Przykładowe Ceny</div>
    </div>
    <div class="stats">
      <span>Usług: <b id="stat-total">0</b></span>
      <span class="sep">|</span>
      <span>Widocznych: <b id="stat-visible">0</b></span>
      <span class="sep">|</span>
      <span>Zaznaczonych: <b id="stat-sel">0</b></span>
    </div>
  </div>
</div>

<div class="layout">

  <!-- LEWA: tabela -->
  <div class="left">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="s-icon">🔍</span>
        <input class="s-input" id="search" type="text" placeholder="Szukaj...">
        <button class="s-clear" id="s-clear" onclick="clearSearch()">✕</button>
      </div>
      <div class="filter-group">
        <label>Wybierz kategorię do wyświetlenia</label>
        <select class="f-sel" id="fKat" onchange="this.className='f-sel'+(this.value?' has':'');applyFilters()">
          <option value="">Wszystkie</option>
          <option value="ANESTEZJOLOGIA">ANESTEZJOLOGIA</option>
<option value="DIAGNOSTYKA">DIAGNOSTYKA</option>
<option value="DOKUMENTACJA / URZĘDOWE">DOKUMENTACJA / URZĘDOWE</option>
<option value="FIZJOTERAPIA I AKUPUNKTURA">FIZJOTERAPIA I AKUPUNKTURA</option>
<option value="POŁOŻNICTWO / ROZRÓD">POŁOŻNICTWO / ROZRÓD</option>
<option value="PROFILAKTYKA">PROFILAKTYKA</option>
<option value="USŁUGI AMBULATORYJNE">USŁUGI AMBULATORYJNE</option>
<option value="ZABIEGI - CHIRURGIA TKANEK MIĘKKICH">ZABIEGI - CHIRURGIA TKANEK MIĘKKICH</option>
<option value="ZABIEGI - CHIRURGIA TKANEK TWARDYCH">ZABIEGI - CHIRURGIA TKANEK TWARDYCH</option>
<option value="ZABIEGI - ENDOSKOPIA">ZABIEGI - ENDOSKOPIA</option>
<option value="ZABIEGI - STOMATOLOGIA">ZABIEGI - STOMATOLOGIA</option>
<option value="OPIEKA SZPITALNA">OPIEKA SZPITALNA</option>
        </select>
      </div>
      <button class="reset-btn" onclick="resetFilters()">✕ Reset</button>
    </div>
    <div class="results-bar">
      <span id="results-info"></span>
      <div style="display:flex;gap:6px">
        <button class="sel-all-btn" onclick="toggleAll(true)">Zaznacz widoczne</button>
        <button class="sel-all-btn" onclick="toggleAll(false)">Odznacz</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th><input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"></th>
          <th onclick="sortBy('nazwa')">Nazwa usługi</th>
          <th onclick="sortBy('wartosc')">Wartość</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty-state" id="empty" style="display:none">
        <div style="font-size:32px;margin-bottom:8px">🔍</div>
        <b>Brak wyników</b>
      </div>
    </div>
  </div>

  <!-- PRAWA: aktywny zestaw + ulubione -->
  <div class="right">

    <!-- Skomponuj zestaw -->
    <div class="right-section">
      <div class="preview-header">
        <div class="section-title" style="margin:0">Skomponuj zestaw</div>
        <span class="preview-count" id="preview-count">0</span>
      </div>
      <div class="preview-items" id="preview-items">
        <div class="preview-empty">Zaznacz pozycje w tabeli</div>
      </div>
      <div class="preview-sum" id="preview-sum" style="display:none">
        <span class="preview-sum-label">Wartość usług</span>
        <span class="preview-sum-value" id="preview-sum-value">0 zł</span>
      </div>
      <div class="save-row">
        <input class="set-name-input" id="set-name" type="text" placeholder="Nazwa zestawu...">
        <button class="btn btn-save" onclick="saveSet()">💾 Zapisz</button>
        <button class="btn btn-clear" onclick="clearActive()">✕</button>
      </div>
    </div>

    <!-- Zestawy -->
    <div class="right-section">
      <div style="margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div class="section-title" style="margin:0">Zestawy</div>
          <div style="display:flex;gap:6px;align-items:center">
            <button onclick="exportAllSets()" title="Eksportuj wszystkie zestawy do pliku .txt"
              style="padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px;background:var(--white);color:var(--text-light);cursor:pointer;white-space:nowrap"
              onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'"
              onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-light)'">
              ⬇ Eksportuj wszystkie
            </button>
            <button onclick="document.getElementById('import-all-file').click()" title="Wczytaj wszystkie zestawy z pliku .txt"
              style="padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px;background:var(--white);color:var(--text-light);cursor:pointer;white-space:nowrap"
              onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'"
              onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-light)'">
              ⬆ Wczytaj wszystkie
            </button>
            <input id="import-all-file" type="file" accept=".txt" style="display:none" onchange="importAllSets(this)">
            <button onclick="document.getElementById('import-file').click()" title="Wczytaj jeden zestaw z pliku .txt"
              style="padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px;background:var(--white);color:var(--text-light);cursor:pointer;white-space:nowrap"
              onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'"
              onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-light)'">
              ⬆ Wczytaj z pliku
            </button>
            <input id="import-file" type="file" accept=".txt" style="display:none" onchange="importSetFromFile(this)">
          </div>
        </div>
        <input id="set-search" type="text" placeholder="Szukaj zestawu…" oninput="renderSetList()"
          style="width:100%;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;outline:none;box-sizing:border-box">
      </div>
      <div class="set-list-wrap">
        <div class="set-list" id="set-list">
          <div class="no-sets">Brak zapisanych zestawów</div>
        </div>
      </div>
      <div style="padding:8px 2px 2px;border-top:1px solid var(--border);margin-top:4px">
        <button onclick="deleteAllSets()"
          style="width:100%;padding:5px;border:1px dashed var(--border);border-radius:var(--radius-sm);font-size:11px;background:none;color:var(--text-light);cursor:pointer"
          onmouseover="this.style.borderColor='var(--danger)';this.style.color='var(--danger)'"
          onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-light)'">
          🗑 Usuń wszystkie zestawy
        </button>
      </div>
    </div>

  </div>
</div>

  var m={'ANESTEZJOLOGIA':'ANESTEZJOLOGIA','DIAGNOSTYKA':'DIAGNOSTYKA','FIZJOTERAPIA I AKUPUNKTURA':'FIZJOTERAPIA','PROFILAKTYKA':'PROFILAKTYKA','USŁUGI AMBULATORYJNE':'AMBULATORYJNE','POŁOŻNICTWO / ROZRÓD':'POLOZNICTWO','ZABIEGI - CHIRURGIA TKANEK MIĘKKICH':'ZABIEGI','ZABIEGI - CHIRURGIA TKANEK TWARDYCH':'ZABIEGI','ZABIEGI - ENDOSKOPIA':'ZABIEGI','ZABIEGI - STOMATOLOGIA':'ZABIEGI','DOKUMENTACJA / URZĘDOWE':'DOKUMENTACJA','OPIEKA SZPITALNA':'SZPITAL'};
  return 'kat-'+(m[k]||'DOKUMENTACJA');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function idToRecord(id){return D.find(function(r){return r.id===id})}
function getSearchVal(){return document.getElementById('search').value.toLowerCase().trim()}

function matches(r,q){
  if(q){
    var h=[r.kat,r.pgr,r.usl,r.roz,r.nazwa,r.klucz].join(' ').toLowerCase();
    if(!q.split(/\s+/).every(function(w){return h.indexOf(w)>=0}))return false;
  }
  var fk=document.getElementById('fKat').value;
  if(fk&&r.kat!==fk)return false;
  return true;
}

function applyFilters(){
  var q=getSearchVal();
  filtered=D.filter(function(r){return matches(r,q)});
  if(sortCol)filtered.sort(function(a,b){var av=a[sortCol]||'',bv=b[sortCol]||'';return sortAsc?av.localeCompare(bv,'pl'):bv.localeCompare(av,'pl')});
  renderTable();
}

function hl(text,q){
  if(!q||!text)return esc(text);
  var result=esc(text);
  q.split(/\s+/).filter(Boolean).forEach(function(w){
    result=result.replace(new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark style="background:#FEF08A;border-radius:2px">$1</mark>');
  });
  return result;
}

function renderTable(){
  var q=getSearchVal();
  var tbody=document.getElementById('tbody');
  document.getElementById('stat-total').textContent=D.length;
  document.getElementById('stat-visible').textContent=filtered.length;
  document.getElementById('stat-sel').textContent=selected.size;
  document.getElementById('results-info').innerHTML='Wyświetlanych: <b>'+filtered.length+'</b> z '+D.length;
  if(filtered.length===0){tbody.innerHTML='';document.getElementById('empty').style.display='block';document.getElementById('chk-all').checked=false;return}
  document.getElementById('empty').style.display='none';
  var html='';
  filtered.forEach(function(r){
    var chk=selected.has(r.id)?'checked':'';
    var sc=selected.has(r.id)?' selected':'';
    html+='<tr class="'+sc+'" id="row-'+r.id+'" onclick="rowClick(event,'+r.id+')">';
    html+='<td><input type="checkbox" '+chk+' onchange="toggleRow('+r.id+',this.checked)" onclick="event.stopPropagation()"></td>';
    html+='<td><span class="nazwa-cell"><b>'+hl(r.nazwa,q)+'</b>'
      +'<div class="tip">'
      +'<span class="tip-label">Kategoria:</span><br>'+esc(r.kat)+'<br>'
      +'<span class="tip-arrow">→</span>'
      +'<span class="tip-label">Podgrupa:</span><br>'+esc(r.pgr)
      +(r.klucz?'<hr style="border:none;border-top:1px solid #ccc;margin:5px 0"><span class="tip-label">Klucz (KliniceXP):</span><br>'+esc(r.klucz):'')
      +'</div></span></td>';
    html+='<td style="text-align:right;white-space:nowrap;color:var(--dark);font-weight:600">'+(r.wartosc!==undefined&&r.wartosc!==null&&r.wartosc!==''?(typeof r.wartosc==='number'?r.wartosc.toLocaleString('pl-PL')+' zł':r.wartosc):'—')+'</td>';
    html+='</tr>';
  });
  tbody.innerHTML=html;
  document.getElementById('chk-all').checked=filtered.length>0&&filtered.every(function(r){return selected.has(r.id)});
  renderPreview();
}

function rowClick(e,id){if(e.target.tagName==='INPUT')return;var chk=!selected.has(id);toggleRow(id,chk);var inp=document.querySelector('#row-'+id+' input[type=checkbox]');if(inp)inp.checked=chk;}

function toggleRow(id,chk){
  if(chk)selected.add(id);else selected.delete(id);
  var row=document.getElementById('row-'+id);
  if(row)row.className=chk?'selected':'';
  document.getElementById('stat-sel').textContent=selected.size;
  renderPreview();
  document.getElementById('chk-all').checked=filtered.length>0&&filtered.every(function(r){return selected.has(r.id)});
}

function toggleAll(chk){filtered.forEach(function(r){if(chk)selected.add(r.id);else selected.delete(r.id)});renderTable()}

function sortBy(col){
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true}
  document.querySelectorAll('th').forEach(function(th){th.classList.remove('sort-asc','sort-desc')});
  var idx={'pgr':1,'usl':2,'roz':3,'nazwa':4}[col];
  var ths=document.querySelectorAll('th');if(ths[idx])ths[idx].classList.add(sortAsc?'sort-asc':'sort-desc');
  applyFilters();
}

function clearSearch(){document.getElementById('search').value='';document.getElementById('s-clear').classList.remove('vis');applyFilters()}

function resetFilters(){
  document.getElementById('search').value='';
  document.getElementById('fKat').value='';
  document.getElementById('s-clear').classList.remove('vis');
  document.getElementById('fKat').classList.remove('has');
  sortCol='';sortAsc=true;
  document.querySelectorAll('th').forEach(function(th){th.classList.remove('sort-asc','sort-desc')});
  applyFilters();
}

// --- PODGLĄD AKTYWNEGO ZESTAWU (prawa kolumna, górna) ---
function renderPreview(){
  var el=document.getElementById('preview-items');
  var sumEl=document.getElementById('preview-sum');
  var sumValEl=document.getElementById('preview-sum-value');
  document.getElementById('preview-count').textContent=selected.size;
  if(selected.size===0){
    el.innerHTML='<div class="preview-empty">Zaznacz pozycje w tabeli</div>';
    sumEl.style.display='none';
    return;
  }
  var html='';var n=0;var sum=0;
  selected.forEach(function(id){
    n++;
    var r=idToRecord(id);if(!r)return;
    var parts=[r.pgr,r.usl,r.roz].filter(function(x){return x&&x.trim()});
    var txt=parts.join(' › ');
    html+='<div class="preview-line">';
    html+='<span class="pl-num">'+n+'.</span>';
    html+='<span class="pl-txt" title="'+esc(txt)+'">'+esc(txt)+'</span>';
    html+='<button class="pl-rm" onclick="removeOne('+id+')" title="Usuń">✕</button>';
    html+='</div>';
    if(typeof r.wartosc==='number')sum+=r.wartosc;
  });
  el.innerHTML=html;
  sumEl.style.display='flex';
  sumValEl.textContent=sum>0?sum.toLocaleString('pl-PL')+' zł':'—';
}

function removeOne(id){
  selected.delete(id);
  var row=document.getElementById('row-'+id);
  if(row){row.className='';var inp=row.querySelector('input[type=checkbox]');if(inp)inp.checked=false}
  document.getElementById('stat-sel').textContent=selected.size;
  document.getElementById('chk-all').checked=filtered.length>0&&filtered.every(function(r){return selected.has(r.id)});
  renderPreview();
}

function clearActive(){
  if(selected.size>0&&!confirm('Wyczyścić aktywny zestaw?'))return;
  selected.clear();document.getElementById('chk-all').checked=false;
  activeSetName=null;
  document.getElementById('set-name').value='';
  renderTable();
}

// --- ZAPIS / WCZYTYWANIE ZESTAWÓW ---
function loadSets(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]')}catch(e){return[]}}
function saveSets(sets){localStorage.setItem(STORE_KEY,JSON.stringify(sets))}

function saveSet(){
  if(selected.size===0){toast('Zaznacz najpierw pozycje');return}
  var name=document.getElementById('set-name').value.trim();
  if(!name){toast('Podaj nazwę zestawu');document.getElementById('set-name').focus();return}
  var sets=loadSets();
  var ei=sets.findIndex(function(s){return s.name===name});
  var obj={name:name,ids:Array.from(selected),date:new Date().toLocaleDateString('pl-PL')};
  if(ei>=0){if(!confirm('Zestaw "'+name+'" już istnieje. Zastąpić?'))return;sets[ei]=obj}
  else sets.unshift(obj);
  saveSets(sets);
  activeSetName=name;
  renderSetList();
  toast('✓ Zapisano "'+name+'"');
}

function loadSet(i){
  var s=loadSets()[i];if(!s)return;
  selected.clear();
  s.ids.forEach(function(id){selected.add(id)});
  document.getElementById('set-name').value=s.name;
  activeSetName=s.name;
  renderTable();
  renderSetList();
  toast('Wczytano: '+s.name);
}

function deleteSet(e,i){
  e.stopPropagation();
  var sets=loadSets();
  if(!confirm('Usunąć "'+sets[i].name+'"?'))return;
  if(activeSetName===sets[i].name)activeSetName=null;
  sets.splice(i,1);saveSets(sets);renderSetList();
}

function deleteAllSets(){
  var sets=loadSets();
  if(sets.length===0){toast('Brak zestawów do usunięcia');return;}
  if(!confirm('Usunąć wszystkie zestawy ('+sets.length+' szt.)?\nTej operacji nie można cofnąć.'))return;
  saveSets([]);renderSetList();
  toast('Usunięto wszystkie zestawy');
}

function exportAllSets(){
  var sets=loadSets();
  if(sets.length===0){toast('Brak zestawów do eksportu');return;}
  var today=new Date().toLocaleDateString('pl-PL');
  var lines=[
    'EDINA — Eksport wszystkich zestawów',
    'Data eksportu: '+today,
    'Liczba zestawów: '+sets.length,
    '---EDINA-ALL-SETS---',
    JSON.stringify(sets)
  ];
  var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  var stamp=new Date().toISOString().slice(0,10);
  a.download='edina_zestawy_'+stamp+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  toast('Wyeksportowano '+sets.length+' zestawów');
}

function importAllSets(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    var match=text.match(/---EDINA-ALL-SETS---\s*\n([\s\S]+)/);
    if(!match){toast('Nieprawidłowy format pliku');input.value='';return;}
    var imported;
    try{imported=JSON.parse(match[1]);}catch(err){toast('Błąd odczytu pliku');input.value='';return;}
    if(!Array.isArray(imported)||imported.length===0){toast('Plik nie zawiera zestawów');input.value='';return;}
    if(!confirm('Zastąpić całą listę zestawów ('+imported.length+' szt.)?\nObecne zestawy zostaną utracone.')){input.value='';return;}
    saveSets(imported);renderSetList();
    toast('Wczytano '+imported.length+' zestawów');
  };
  reader.readAsText(file,'utf-8');
  input.value='';
}

function importSetFromFile(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    var nameMatch=text.match(/^Nazwa:\s*(.+)$/m);
    var idsMatch=text.match(/---EDINA-IDS---\s*\n(\[.*?\])/s);
    if(!idsMatch){toast('Nieprawidłowy format pliku');input.value='';return;}
    var ids;
    try{ids=JSON.parse(idsMatch[1]);}catch(err){toast('Błąd odczytu pliku');input.value='';return;}
    var name=nameMatch?nameMatch[1].trim():'Zestaw z pliku';
    var sets=loadSets();
    var ei=sets.findIndex(function(s){return s.name===name});
    var obj={name:name,ids:ids,date:new Date().toLocaleDateString('pl-PL')};
    if(ei>=0){if(!confirm('Zestaw "'+name+'" już istnieje. Zastąpić?')){input.value='';return;}sets[ei]=obj;}
    else{sets.push(obj);}
    saveSets(sets);renderSetList();
    toast('Wczytano zestaw „'+name+'"');
  };
  reader.readAsText(file,'utf-8');
  input.value='';
}

function downloadSet(i){
  var sets=loadSets();
  var s=sets[i];if(!s)return;
  var lines=['EDINA — Zestaw Ulubionych','Nazwa: '+s.name,'Data: '+s.date,'','─'.repeat(50),''];
  var n=0;
  s.ids.forEach(function(id){
    var r=idToRecord(id);if(!r)return;
    n++;
    lines.push(n+'. '+[r.pgr,r.usl,r.roz].filter(Boolean).join(' › '));
  });
  lines.push('');lines.push('─'.repeat(50));
  lines.push('---EDINA-IDS---');
  lines.push(JSON.stringify(s.ids));
  var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='zestaw_'+s.name.replace(/[^a-zA-Z0-9ąćęłńóśźżĄĆĘŁŃÓŚŹŻ _-]/g,'_')+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function renderSetList(){
  var allSets=loadSets();
  var q=(document.getElementById('set-search')||{value:''}).value.trim().toLowerCase();
  var sets=q?allSets.filter(function(s){return s.name.toLowerCase().includes(q)}):allSets;
  var el=document.getElementById('set-list');
  if(allSets.length===0){
    el.innerHTML='<div class="no-sets">Brak zapisanych zestawów</div>';
    return;
  }
  if(sets.length===0){
    el.innerHTML='<div class="no-sets">Brak wyników dla „'+esc(q)+'"</div>';
    return;
  }
  var html='';
  sets.forEach(function(s){
    var i=allSets.indexOf(s);
    var active=s.name===activeSetName?' set-active':'';
    var sum=0;
    var tipLines=[];
    s.ids.forEach(function(id){
      var r=idToRecord(id);
      if(!r)return;
      if(typeof r.wartosc==='number')sum+=r.wartosc;
      tipLines.push(esc(r.nazwa||[r.usl,r.roz].filter(Boolean).join(' › ')));
    });
    var sumStr=sum.toLocaleString('pl-PL',{minimumFractionDigits:0,maximumFractionDigits:2})+' zł';
    var tip='<div class="tip-label">Skład ('+s.ids.length+' poz.):</div>'
      +tipLines.map(function(l){return '<div style="padding:3px 0;border-bottom:1px solid #ddd">'+l+'</div>'}).join('');
    html+='<div class="set-row'+active+'">';
    html+='<div class="set-row-name-wrap">';
    html+='<span class="set-row-name">'+esc(s.name)+'</span>';
    html+='<div class="set-row-tip">'+tip+'</div>';
    html+='</div>';
    html+='<span class="set-row-val">'+sumStr+'</span>';
    html+='<button class="sca-load" onclick="loadSet('+i+')">Wczytaj</button>';
    html+='<button class="sca-dl" onclick="downloadSet('+i+')" title="Pobierz .txt">⬇</button>';
    html+='<button class="sca-del" onclick="deleteSet(event,'+i+')" title="Usuń">🗑</button>';
    html+='</div>';
  });
  el.innerHTML=html;
}

function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2800)}

document.getElementById('search').addEventListener('input',function(){
  document.getElementById('s-clear').className='s-clear'+(this.value?' vis':'');
  applyFilters();
});

applyFilters();
renderSetList();

</script>
</body>
</html>
